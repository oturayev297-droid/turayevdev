# GitLab CI/CD Pipeline for Django
stages:
  - test
  - deploy

image: python:3.12-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - venv/

before_script:
  - python -V
  - pip install virtualenv
  - virtualenv venv
  - source venv/bin/activate
  - pip install -r requirements.txt

test_job:
  stage: test
  script:
    - python manage.py check
    - # python manage.py test  # Uncomment if you have tests

deploy_check:
  stage: deploy
  script:
    - echo "GitLab CI structure verified. Ready for cloud deployment."
  only:
    - master
    - main
